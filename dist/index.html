<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Study Command Center — AI-powered study dashboard with Pomodoro timer, task manager, biometric readiness, calendar, and ambient sounds to help you study smarter." />
    <meta name="theme-color" content="#0D1117" />
    <meta property="og:title" content="Study Command Center" />
    <meta property="og:description" content="AI-powered study hub with smart scheduling, biometric readiness, and focus tools." />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>" />
    <title>Study Command Center</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; background: #0D1117; }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes popIn {
        0%   { opacity: 0; transform: scale(0.94); }
        70%  { transform: scale(1.03); }
        100% { opacity: 1; transform: scale(1); }
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes urgentPulse {
        0%, 100% { box-shadow: 0 0 0 2px #F8514933, 0 0 8px #F8514922; }
        50%      { box-shadow: 0 0 0 3px #F8514966, 0 0 18px #F8514944; }
      }
      @keyframes choiceReveal {
        from { opacity: 0.4; transform: translateX(-4px); }
        to   { opacity: 1;   transform: translateX(0); }
      }
      @keyframes cardEnterAnim {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .animate-fadeIn    { animation: fadeIn .25s ease both; }
      .animate-popIn     { animation: popIn .3s cubic-bezier(.16,1,.3,1) both; }
      .animate-slideUp   { animation: slideUp .3s ease both; }
      .animate-slideDown { animation: slideDown .25s ease both; }

      .card-enter {
        animation: cardEnterAnim .28s ease both;
        animation-delay: calc(var(--i, 0) * 45ms);
        opacity: 0;
        animation-fill-mode: both;
      }

      /* ── Responsive ─────────────────────────────────────────────── */
      /* Focus Hub grid */
      .focus-hub-grid {
        grid-template-columns: minmax(280px, 340px) 1fr minmax(220px, 280px);
      }
      @media (max-width: 1100px) {
        .focus-hub-grid {
          grid-template-columns: 1fr 1fr !important;
        }
      }
      @media (max-width: 700px) {
        .focus-hub-grid {
          grid-template-columns: 1fr !important;
        }
      }

      /* ── Mobile panel switcher (hidden on desktop) ───────────── */
      .mobile-dash-switcher { display: none; }

      /* ── Mobile: ≤768px ─────────────────────────────────────── */
      @media (max-width: 768px) {
        /* Nav bar stacks into two rows */
        .scc-topbar {
          flex-wrap: wrap;
          gap: 6px;
          padding: 8px 12px !important;
          height: auto !important;
          min-height: 48px;
        }
        /* Tabs go to second row, scrollable */
        .scc-tabs {
          order: 3;
          width: 100%;
          overflow-x: auto;
          padding-bottom: 2px;
          scrollbar-width: none;
          gap: 2px !important;
        }
        .scc-tabs::-webkit-scrollbar { display: none; }
        /* Smaller tab buttons on mobile */
        .scc-tabs .nav-tab {
          padding: 8px 10px !important;
          font-size: 0.8rem !important;
          white-space: nowrap;
          min-height: 44px;
        }

        /* Upload button: show only "+" icon */
        .scc-upload-btn .scc-upload-text { display: none; }
        .scc-upload-btn .scc-upload-icon { display: inline; }
        .scc-upload-btn { padding: 5px 10px !important; }

        /* Hide theme button text */
        .scc-theme-text { display: none; }

        /* Demo banner shorter text */
        .scc-demo-long { display: none; }

        /* ── Dashboard: single-panel view ───────────────────────── */
        .scc-dashboard-layout {
          display: flex !important;
          flex-direction: column !important;
          overflow: hidden !important;
          padding-bottom: 64px !important; /* room for switcher bar */
        }
        /* All panels fill space and scroll internally */
        .dash-list, .dash-detail, .dash-control {
          flex: 1 !important;
          overflow-y: auto !important;
          min-height: 0 !important;
          border-left: none !important;
          border-right: none !important;
          border-bottom: 1px solid var(--border) !important;
        }
        /* Hide inactive panels */
        .scc-dashboard-layout[data-panel="list"]    .dash-detail,
        .scc-dashboard-layout[data-panel="list"]    .dash-control,
        .scc-dashboard-layout[data-panel="detail"]  .dash-list,
        .scc-dashboard-layout[data-panel="detail"]  .dash-control,
        .scc-dashboard-layout[data-panel="control"] .dash-list,
        .scc-dashboard-layout[data-panel="control"] .dash-detail {
          display: none !important;
        }

        /* ── Mobile panel switcher bar ───────────────────────────── */
        .mobile-dash-switcher {
          display: flex !important;
          position: fixed;
          bottom: 0;
          left: 0;
          right: 0;
          height: 62px;
          z-index: 200;
          background: var(--bg-surface, rgba(22,27,34,0.97));
          border-top: 1px solid var(--border, rgba(48,54,61,0.70));
          backdrop-filter: blur(24px) saturate(160%);
          -webkit-backdrop-filter: blur(24px) saturate(160%);
          box-shadow: 0 -4px 24px rgba(0,0,0,0.3);
        }
        .mobile-dash-tab {
          flex: 1;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background: none;
          border: none;
          color: var(--text-muted, #8B949E);
          cursor: pointer;
          font-family: 'Inter', system-ui, sans-serif;
          padding: 8px 4px 10px;
          transition: color 0.15s, background 0.15s;
          position: relative;
          min-height: 44px;
        }
        .mobile-dash-tab.active { color: #58A6FF; }
        .mobile-dash-tab.active::before {
          content: '';
          position: absolute;
          top: 0;
          left: 50%;
          transform: translateX(-50%);
          width: 32px;
          height: 2px;
          background: #58A6FF;
          border-radius: 0 0 2px 2px;
        }
        .mobile-dash-tab:active { background: var(--bg-elevated); }

        /* Calendar side panel hidden */
        .scc-cal-side { display: none !important; }
      }

      /* ── Very small screens: ≤480px ─────────────────────────── */
      @media (max-width: 480px) {
        .scc-tabs .nav-tab {
          padding: 6px 8px !important;
          font-size: 0.75rem !important;
        }
      }

      /* Smooth range input */
      input[type=range] {
        -webkit-appearance: none;
        height: 4px;
        border-radius: 2px;
        background: var(--bg-elevated, #21262D);
        outline: none;
      }
      input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #58A6FF;
        cursor: pointer;
        box-shadow: 0 0 6px rgba(88,166,255,0.5);
        transition: transform .15s;
      }
      input[type=range]::-webkit-slider-thumb:hover {
        transform: scale(1.2);
      }
    </style>
    <script type="module" crossorigin src="/ReactBox/assets/index-DPo5uIJj.js"></script>
    <link rel="stylesheet" crossorigin href="/ReactBox/assets/index-DFU4dPHS.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
