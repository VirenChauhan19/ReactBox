<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Study Command Center — AI-powered study dashboard with Pomodoro timer, task manager, biometric readiness, calendar, and ambient sounds to help you study smarter." />
    <meta name="theme-color" content="#0D1117" />
    <meta property="og:title" content="Study Command Center" />
    <meta property="og:description" content="AI-powered study hub with smart scheduling, biometric readiness, and focus tools." />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>" />
    <title>Study Command Center</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; background: #0D1117; }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes popIn {
        0%   { opacity: 0; transform: scale(0.94); }
        70%  { transform: scale(1.03); }
        100% { opacity: 1; transform: scale(1); }
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes urgentPulse {
        0%, 100% { box-shadow: 0 0 0 2px #F8514933, 0 0 8px #F8514922; }
        50%      { box-shadow: 0 0 0 3px #F8514966, 0 0 18px #F8514944; }
      }
      @keyframes choiceReveal {
        from { opacity: 0.4; transform: translateX(-4px); }
        to   { opacity: 1;   transform: translateX(0); }
      }
      @keyframes cardEnterAnim {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .animate-fadeIn    { animation: fadeIn .25s ease both; }
      .animate-popIn     { animation: popIn .3s cubic-bezier(.16,1,.3,1) both; }
      .animate-slideUp   { animation: slideUp .3s ease both; }
      .animate-slideDown { animation: slideDown .25s ease both; }

      .card-enter {
        animation: cardEnterAnim .28s ease both;
        animation-delay: calc(var(--i, 0) * 45ms);
        opacity: 0;
        animation-fill-mode: both;
      }

      /* ── Responsive ─────────────────────────────────────────────── */
      /* Focus Hub grid */
      .focus-hub-grid {
        grid-template-columns: minmax(280px, 340px) 1fr minmax(220px, 280px);
      }
      @media (max-width: 1100px) {
        .focus-hub-grid {
          grid-template-columns: 1fr 1fr !important;
        }
      }
      @media (max-width: 700px) {
        .focus-hub-grid {
          grid-template-columns: 1fr !important;
        }
      }

      /* Top nav wrapping on small screens */
      @media (max-width: 768px) {
        /* Nav bar stacks */
        .scc-topbar {
          flex-wrap: wrap;
          gap: 8px;
          padding: 8px 12px !important;
        }
        .scc-tabs {
          order: 3;
          width: 100%;
          overflow-x: auto;
          padding-bottom: 4px;
          scrollbar-width: none;
        }
        .scc-tabs::-webkit-scrollbar { display: none; }
        /* Dashboard layout stacks vertically */
        .scc-dashboard-layout {
          flex-direction: column !important;
          overflow-y: auto !important;
        }
        .scc-dashboard-layout > * {
          min-height: auto !important;
          max-height: none !important;
        }
        /* Calendar side panel hidden on mobile */
        .scc-cal-side {
          display: none !important;
        }
      }

      /* Smooth range input */
      input[type=range] {
        -webkit-appearance: none;
        height: 4px;
        border-radius: 2px;
        background: var(--bg-elevated, #21262D);
        outline: none;
      }
      input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #58A6FF;
        cursor: pointer;
        box-shadow: 0 0 6px rgba(88,166,255,0.5);
        transition: transform .15s;
      }
      input[type=range]::-webkit-slider-thumb:hover {
        transform: scale(1.2);
      }
    </style>
    <script type="module" crossorigin src="/ReactBox/assets/index-COQQz1tq.js"></script>
    <link rel="stylesheet" crossorigin href="/ReactBox/assets/index-DuLUGbIF.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
